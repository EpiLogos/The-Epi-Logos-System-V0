repos:
  # Basic hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Prettier for frontend formatting (safe, fast)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|css|md|yaml|yml)$
        exclude: |
          (?x)^(
              \.next/.*|
              node_modules/.*|
              dist/.*|
              build/.*|
              coverage/.*
          )$

  # Ruff for Python linting and formatting (fast)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.8
    hooks:
      - id: ruff
        files: ^(backend|agentic)/.*\.py$
        args: [--fix]
      - id: ruff-format
        files: ^(backend|agentic)/.*\.py$

  # Black for Python formatting (enforces consistent style)
  - repo: https://github.com/psf/black
    rev: 24.12.0
    hooks:
      - id: black
        files: ^(backend|agentic)/.*\.py$
        language_version: python3.13

# Keep hooks fast; run full tests in CI, not pre-commit
