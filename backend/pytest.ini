[pytest]
# Restrict discovery to backend tests from repo root
testpaths = backend/tests backend/tests/unit/auth/oauth backend/tests/unit/security
# Keep output quiet; ignore noisy/legacy trees during phased cleanup
addopts = -q --ignore=backend/tests/integration --ignore=backend/epi_logos_system
# Optional future use: mark stable subset only (uncomment when ready)
# markers =
#     unit: stable unit tests
#     integration: integration tests (may require external services)
