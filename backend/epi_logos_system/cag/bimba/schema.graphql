scalar Generic

type BimbaNode {
    coordinate: String!
    name: String!
    subsystem: String
    description: String
    operationalEssence: String
    coreNature: String
    function: String
    architecturalFunction: String
    symbol: String
    uuid: String
    createdAt: String
    updatedAt: String
}

"""Complete node with ALL Neo4j properties via Generic scalar - no filtering"""
type BimbaNodeComplete {
    coordinate: String!
    name: String!
    allProperties: Generic!
}

"""Direction of a relationship relative to the queried node"""
enum RelationshipDirection {
    INCOMING
    OUTGOING
}

"""Key-value properties on a relationship edge"""
type RelationshipProperty {
    key: String!
    value: String
}

"""A relationship edge connecting the queried node to a neighbor"""
type RelationshipEdge {
    type: String!
    direction: RelationshipDirection!
    neighbor: BimbaNode!
    properties: [RelationshipProperty!]
}

"""A node bundled with its immediate relationship edges"""
type NodeWithEdges {
    node: BimbaNode!
    edges: [RelationshipEdge!]!
}

type SearchResult {
    coordinate: String!
    name: String!
    subsystem: String
    description: String
    relevance_score: Float
}

type SearchResponse {
    success: Boolean!
    results: [SearchResult!]!
    error: String
}

type LexicalSearchResult {
    coordinate: String!
    name: String!
    description: String
}

type LexicalSearchResponse {
    success: Boolean!
    results: [LexicalSearchResult!]!
    error: String
}

type DirectChildrenResult {
    coordinate: String!
    name: String!
    primaryDesignation: String
    description: String
}

type DirectChildrenResponse {
    success: Boolean!
    children: [DirectChildrenResult!]!
    error: String
}

type SubsystemCoordinatesResponse {
    success: Boolean!
    coordinates: [BimbaNode!]!
    error: String
}

"""Simple coordinate metadata for tree display"""
type BimbaCoordinate {
    coordinate: String!
    name: String!
    subsystem: Int
}

type Query {
    getNodeByCoordinate(coordinate: String!): BimbaNode
    getNodeDetailsComplete(coordinate: String!, includeFunctionalProperties: Boolean): BimbaNodeComplete
    getNodeByCoordinateExtended(coordinate: String!): BimbaNodeExtended
    getNodeWithRelationships(coordinate: String!): NodeWithEdges
    searchCoordinates(query: String!, subsystem: Int, limit: Int): SearchResponse
    getSubsystemCoordinates(subsystem: Int!, limit: Int): SubsystemCoordinatesResponse
    getPathBetweenCoordinates(startCoordinate: String!, endCoordinate: String!, maxHops: Int): GraphPath
    semanticCoordinateDiscovery(queryText: String!, maxResults: Int, alpha: Float): [BimbaCoordinateMatch!]!
    lexicalCoordinateSearch(searchString: String!, limit: Int): LexicalSearchResponse
    directChildren(bimbaCoordinate: String!): DirectChildrenResponse
    getAllCoordinates: [BimbaCoordinate!]!
    getWisdomPacket(coordinate: String!, depth: Int, focus: WisdomPacketFocus, forceRegenerate: Boolean): WisdomPacket
}

"""Structured mutation error with code taxonomy"""
type MutationError {
    field: String
    message: String!
    code: String!
}

input CreateBimbaNodeInput {
    coordinate: String!
    name: String!
    subsystem: Int!
    description: String
    operationalEssence: String
    coreNature: String
    function: String
    architecturalFunction: String
    symbol: String
}

type CreateBimbaNodePayload {
    success: Boolean!
    node: BimbaNode
    errors: [MutationError!]
}

"""Input for updating an existing Bimba node with flexible schema-based properties"""
input UpdateBimbaNodeInput {
    coordinate: String!

    # Core Identity Properties
    name: String
    primaryDesignation: String
    coreNature: String
    architecturalFunction: String

    # Consolidated Structure Properties
    internalStructure: String

    # Principle Arrays
    keyPrinciples: [String!]
    resonances: [String!]
    practicalApplications: [String!]

    # Operational Properties
    operationalEssence: String
    accessLevel: String
    consciousnessStructure: String
    operationalSymbolics: String

    # Relational Properties
    relatedCoordinates: [String!]

    # Legacy/Optional Fields
    description: String
    function: String
    symbol: String

    # Flexible properties for arbitrary coordinate-specific fields
    # Uses key-value array format (same pattern as relationship properties)
    # Example: [{key: "f_cycle_orchestration", value: "Sequential flow..."}, {key: "spandaMode", value: "oscillatory"}]
    properties: [PropertyInput!]
}

"""Input type for flexible key-value properties"""
input PropertyInput {
    key: String!
    value: String!
}

"""Extended Bimba node type with all flexible schema properties"""
type BimbaNodeExtended {
    # Standard properties
    coordinate: String!
    name: String!
    subsystem: String

    # Core Identity Properties
    primaryDesignation: String
    coreNature: String
    architecturalFunction: String

    # Consolidated Structure Properties
    internalStructure: String

    # Principle Arrays
    keyPrinciples: [String!]
    resonances: [String!]
    practicalApplications: [String!]

    # Operational Properties
    operationalEssence: String
    accessLevel: String
    consciousnessStructure: String
    operationalSymbolics: String

    # Relational Properties
    relatedCoordinates: [String!]
    lastUpdated: String

    # Legacy/Optional Fields
    description: String
    function: String
    symbol: String
    uuid: String

    # Metadata
    createdAt: String
    updatedAt: String
}

"""Payload for updateBimbaNode mutation"""
type UpdateBimbaNodePayload {
    success: Boolean!
    node: BimbaNodeExtended
    errors: [MutationError!]
}

"""Flexible key-value property for relationships"""
input RelationshipPropertyInput {
    key: String!
    value: String!
}

"""Input for creating/updating a relationship between Bimba nodes"""
input CreateBimbaRelationshipInput {
    fromCoordinate: String!
    toCoordinate: String!
    relationshipType: String!
    properties: [RelationshipPropertyInput!]
    bidirectional: Boolean
}

"""A created/updated relationship with its properties"""
type BimbaRelationship {
    type: String!
    fromCoordinate: String!
    toCoordinate: String!
    properties: [RelationshipProperty!]!
    createdAt: String
    updatedAt: String
}

"""Payload for relationship creation/update"""
type CreateBimbaRelationshipPayload {
    success: Boolean!
    relationship: BimbaRelationship
    reverseRelationship: BimbaRelationship
    wasUpdate: Boolean!
    errors: [MutationError!]
}

type Mutation {
    createBimbaNode(input: CreateBimbaNodeInput!): CreateBimbaNodePayload
    updateBimbaNode(input: UpdateBimbaNodeInput!): UpdateBimbaNodePayload
    createBimbaRelationship(input: CreateBimbaRelationshipInput!): CreateBimbaRelationshipPayload
    regenerateNodeEmbedding(coordinate: String!): RegenerateEmbeddingPayload!
    regenerateAllEmbeddings(batchSize: Int = 500, force: Boolean = false): RegenerateAllEmbeddingsPayload!
}

"""Ordered path between two coordinates with nodes and relationships"""
type GraphPath {
    startNode: BimbaNode!
    endNode: BimbaNode!
    pathLength: Int!
    pathComponents: [PathComponent!]!
}

union PathComponent = PathNode | PathRelationship

type PathNode {
    coordinate: String!
    name: String!
    subsystem: String
    position: Int!
}

type PathRelationship {
    type: String!
    direction: RelationshipDirection!
    properties: [RelationshipProperty!]!
    position: Int!
}

"""A semantic match for a Bimba coordinate"""
type BimbaCoordinateMatch {
    coordinate: String!
    name: String!
    similarity: Float!
    semanticContext: String
    namespace: String
    clusterId: String
    clusterTheme: String
}

"""Result of a single-node embedding regeneration"""
type RegenerateEmbeddingPayload {
    success: Boolean!
    coordinate: String!
    dimension: Int
    updatedAt: String
    model: String
    hash: String
    error: String
}

"""Result of a bulk embedding regeneration run"""
type RegenerateAllEmbeddingsPayload {
    success: Boolean!
    total: Int!
    updated: Int!
    skipped: Int!
    error: String
}

# ============================================================================
# Wisdom Packet Types (Story 03.01)
# ============================================================================

"""Synthesis focus lens for WisdomPacket generation"""
enum WisdomPacketFocus {
    STRUCTURAL
    PROCESSUAL
    ARCHETYPAL
    PRACTICAL
}

"""Basic Bimba node information for wisdom packet"""
type BimbaNodeBasic {
    coordinate: String!
    name: String!
    subsystem: String!
    description: String
    operationalEssence: String
}

"""Key concept extracted from subgraph"""
type KeyConcept {
    concept: String!
    sourceCoordinates: [String!]!
    relevanceScore: Float!
    description: String
}

"""Apophatic pointer to missing themes"""
type ApophaticPointer {
    missingTheme: String!
    expectedCoordinates: [String!]!
    suggestion: String!
}

"""Pre-synthesized WisdomPacket for a Bimba coordinate"""
type WisdomPacket {
    centralNode: BimbaNodeBasic!
    keyConcepts: [KeyConcept!]!
    narrativeSummary: String!
    apophaticPointers: [ApophaticPointer!]!
    contextualThemes: [String!]!
    synthesisScore: Float!
    generatedAt: String!
    cacheHit: Boolean!
    depth: Int!
    focus: WisdomPacketFocus
}
