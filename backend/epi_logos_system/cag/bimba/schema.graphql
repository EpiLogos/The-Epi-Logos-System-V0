type BimbaNode {
    coordinate: String!
    name: String!
    subsystem: String
    description: String
    operationalEssence: String
    coreNature: String
    function: String
    architecturalFunction: String
    symbol: String
    uuid: String
    createdAt: String
    updatedAt: String
}

"""Direction of a relationship relative to the queried node"""
enum RelationshipDirection {
    INCOMING
    OUTGOING
}

"""Key-value properties on a relationship edge"""
type RelationshipProperty {
    key: String!
    value: String
}

"""A relationship edge connecting the queried node to a neighbor"""
type RelationshipEdge {
    type: String!
    direction: RelationshipDirection!
    neighbor: BimbaNode!
    properties: [RelationshipProperty!]
}

"""A node bundled with its immediate relationship edges"""
type NodeWithEdges {
    node: BimbaNode!
    edges: [RelationshipEdge!]!
}

type SearchResult {
    coordinate: String!
    name: String!
    subsystem: String
    description: String
    relevance_score: Float
}

type SearchResponse {
    success: Boolean!
    results: [SearchResult!]!
    error: String
}

type SubsystemCoordinatesResponse {
    success: Boolean!
    coordinates: [BimbaNode!]!
    error: String
}

type Query {
    getNodeByCoordinate(coordinate: String!): BimbaNode
    getNodeWithRelationships(coordinate: String!): NodeWithEdges
    searchCoordinates(query: String!, subsystem: Int, limit: Int): SearchResponse
    getSubsystemCoordinates(subsystem: Int!, limit: Int): SubsystemCoordinatesResponse
    getPathBetweenCoordinates(startCoordinate: String!, endCoordinate: String!, maxHops: Int): GraphPath
    semanticCoordinateDiscovery(queryText: String!, maxResults: Int): [BimbaCoordinateMatch!]!
}

"""Structured mutation error with code taxonomy"""
type MutationError {
    field: String
    message: String!
    code: String!
}

input CreateBimbaNodeInput {
    coordinate: String!
    name: String!
    subsystem: Int!
    description: String
    operationalEssence: String
    coreNature: String
    function: String
    architecturalFunction: String
    symbol: String
}

type CreateBimbaNodePayload {
    success: Boolean!
    node: BimbaNode
    errors: [MutationError!]
}

type Mutation {
    createBimbaNode(input: CreateBimbaNodeInput!): CreateBimbaNodePayload
    regenerateNodeEmbedding(coordinate: String!): RegenerateEmbeddingPayload!
    regenerateAllEmbeddings(batchSize: Int = 500, force: Boolean = false): RegenerateAllEmbeddingsPayload!
}

"""Ordered path between two coordinates with nodes and relationships"""
type GraphPath {
    startNode: BimbaNode!
    endNode: BimbaNode!
    pathLength: Int!
    pathComponents: [PathComponent!]!
}

union PathComponent = PathNode | PathRelationship

type PathNode {
    coordinate: String!
    name: String!
    subsystem: String
    position: Int!
}

type PathRelationship {
    type: String!
    direction: RelationshipDirection!
    properties: [RelationshipProperty!]!
    position: Int!
}

"""A semantic match for a Bimba coordinate"""
type BimbaCoordinateMatch {
    coordinate: String!
    name: String!
    similarity: Float!
    semanticContext: String
    namespace: String
    clusterId: String
    clusterTheme: String
}

"""Result of a single-node embedding regeneration"""
type RegenerateEmbeddingPayload {
    success: Boolean!
    coordinate: String!
    dimension: Int
    updatedAt: String
    model: String
    hash: String
    error: String
}

"""Result of a bulk embedding regeneration run"""
type RegenerateAllEmbeddingsPayload {
    success: Boolean!
    total: Int!
    updated: Int!
    skipped: Int!
    error: String
}
