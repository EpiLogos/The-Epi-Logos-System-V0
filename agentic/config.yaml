# Orchestrator capabilities configuration
models:
  # Allowed models, provider:model
  allowed:
    - openai:gpt-4o-mini
    - openai:gpt-4o
    - gemini:gemini-2.5-flash
    - anthropic:claude-3-5-haiku
    - deepseek:deepseek-chat
    - test:test  # For Pydantic AI agent testing
  # Default model must be in the allowed list
  default: openai:gpt-4o

# CLI (client) convenience defaults
transcripts_dir: transcripts
